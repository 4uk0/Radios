<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radios</title>
<meta name="description" content="An interactive boombox that plays surprise radio stations from around the world.">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --font-optima: Optima, 'Optima Nova LT', Candara, 'Noto Sans', sans-serif; }
html, body {
  background: #ffffff;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  padding: 20px 0 40px;
}
.wrapper {
  position: relative;
  width: min(98vw, 1080px);
  user-select: none;
  margin-top: 10px;
}
.wrapper img { width: 100%; display: block; pointer-events: none; }
.overlay { position: absolute; inset: 0; pointer-events: none; }
.overlay > * { pointer-events: all; }

/* ── EQ DISPLAY ── */
.eq-disp {
  position: absolute;
  background: rgba(6,12,6,0.93);
  border: 1px solid rgba(0,0,0,0.6);
  border-radius: 2px;
  display: flex; align-items: flex-end; gap: 1.5px; padding: 3px 4px 2px;
  overflow: hidden; pointer-events: none;
}
.eq-bar {
  flex: 1; background: #006600; border-radius: 1px 1px 0 0;
  min-height: 2px; box-shadow: 0 0 2px #004400;
  transition: height 0.08s ease;
}

/* ── STATION INFO (separate display) ── */
.station-disp {
  position: absolute;
  background: rgba(6,10,6,0.93);
  border: 1px solid rgba(0,0,0,0.7);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: flex-start;
  padding: 0 6px; overflow: hidden; pointer-events: none;
}
.station-text {
  font-family: 'Courier New', monospace;
  color: #00dd00; font-weight: bold;
  letter-spacing: 1px;
  text-shadow: 0 0 5px #00aa00;
  white-space: nowrap;
  font-size: clamp(6px, 1vw, 12px);
  display: inline-block;
}
.station-text.scroll { animation: marquee 12s linear infinite; }
@keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-120%); } }
.station-text.blink { animation: blink 0.5s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ── TUNER ── */
.tuner {
  position: absolute;
  background: rgba(6,8,20,0.9);
  border: 1px solid rgba(0,0,0,0.7);
  border-radius: 2px; cursor: pointer; overflow: hidden;
}
.tuner-marks {
  position: absolute; inset: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 5px; font-size: clamp(5px, 0.55vw, 8px);
  color: rgba(160,160,220,0.8); pointer-events: none;
  font-family: 'Courier New', monospace;
}
.tuner-needle {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: #ff3333; box-shadow: 0 0 4px #ff2222;
  left: 30%; transition: left 0.5s ease; pointer-events: none;
}

/* ── VOLUME SLIDER ── */
.vol-slider-wrap {
  position: absolute;
  display: flex; align-items: center;
}
.vol-slider-wrap input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 100%;
  background: transparent; cursor: pointer; outline: none;
}
.vol-slider-wrap input[type=range]::-webkit-slider-runnable-track {
  height: 4px;
  background: linear-gradient(90deg, #333 0%, #777 100%);
  border-radius: 2px; border: 1px solid rgba(0,0,0,0.5);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
}
.vol-slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 20px; border-radius: 2px;
  background: linear-gradient(to bottom, #d8d8d8 0%, #888 50%, #555 100%);
  border: 1.5px solid #222;
  box-shadow: 1px 2px 4px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.35);
  margin-top: -8px; cursor: grab;
}
.vol-slider-wrap input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }
.vol-slider-wrap input[type=range]::-moz-range-track {
  height: 4px; background: linear-gradient(90deg, #333, #777); border-radius: 2px;
}
.vol-slider-wrap input[type=range]::-moz-range-thumb {
  width: 12px; height: 20px; border-radius: 2px;
  background: linear-gradient(to bottom, #d8d8d8 0%, #888 50%, #555 100%);
  border: 1.5px solid #222; cursor: grab;
}

/* ── KNOBS ── */
.knob-wrap {
  position: absolute; cursor: grab; border-radius: 50%;
}
.knob-wrap:active { cursor: grabbing; }
.knob-ring {
  width: 100%; height: 100%; border-radius: 50%;
  background: radial-gradient(circle at 35% 28%,
    #888 0%, #555 30%, #222 65%, #0a0a0a 100%);
  border: 2px solid #111; position: relative;
  box-shadow:
    2px 3px 8px rgba(0,0,0,0.75),
    inset 0 2px 3px rgba(255,255,255,0.2),
    inset 0 -2px 4px rgba(0,0,0,0.6);
}
.knob-wrap:hover .knob-ring {
  box-shadow:
    2px 3px 8px rgba(0,0,0,0.75),
    0 0 0 2px rgba(200,160,80,0.55),
    inset 0 2px 3px rgba(255,255,255,0.2),
    inset 0 -2px 4px rgba(0,0,0,0.6);
}
.knob-dot {
  position: absolute; left: 50%; top: 10%;
  width: 3px; height: 30%;
  background: linear-gradient(to bottom, #fff, #bbb);
  border-radius: 2px; transform: translateX(-50%);
  transform-origin: bottom center;
  box-shadow: 0 0 4px rgba(255,255,255,0.6);
}
.knob-label {
  position: absolute; bottom: 102%; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(6px, 0.65vw, 9px);
  font-family: 'Courier New', monospace;
  color: rgba(40,40,40,0.95); letter-spacing: 0.5px;
  white-space: nowrap; font-weight: 700; text-transform: uppercase;
  pointer-events: none;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
}

/* ── TRANSPORT BUTTONS ── */
.trans-btn {
  position: absolute;
  background: linear-gradient(to bottom, #c8c8c8 0%, #888 100%);
  border: 1.5px solid #444; border-radius: 5px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(9px, 1.3vw, 16px); color: #111;
  box-shadow: 0 3px 0 #333, inset 0 1px 0 rgba(255,255,255,0.55);
  transition: transform 0.07s, box-shadow 0.07s, background 0.07s, filter 0.07s;
}
.trans-btn:hover { background: linear-gradient(to bottom, #ddd 0%, #aaa 100%); }
.trans-btn:active, .trans-btn.pressed {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #333, inset 0 1px 3px rgba(0,0,0,0.35);
  background: linear-gradient(to bottom, #888 0%, #666 100%);
  filter: brightness(0.8);
}
.trans-btn.rec-active {
  background: linear-gradient(to bottom, #cc3300 0%, #881100 100%);
  color: #fff; border-color: #660000;
  box-shadow: 0 3px 0 #440000, inset 0 1px 0 rgba(255,120,80,0.4);
}





/* ── SPEAKER GLOW ── */
.spk-glow {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,0,0,0.18), transparent 60%);
  pointer-events: none; opacity: 0;
}
.playing .spk-glow { animation: spkPulse 0.6s ease-in-out infinite alternate; }
@keyframes spkPulse { from { opacity: 0; } to { opacity: 1; } }

/* ── RECORDINGS LIST ── */
#recordingsWrap {
  width: min(94vw, 960px);
  margin-top: 24px; display: none;
  border-top: 1px solid #e0e0e0; padding-top: 20px;
}
#recordingsWrap h3 {
  font-size: 11px; letter-spacing: 2px; color: #aaa;
  text-transform: uppercase; margin-bottom: 12px; font-family: var(--font-optima);
}
#recordingsList {
  font-size: 13px; color: #333; line-height: 1.8;
  min-height: 32px; font-family: var(--font-optima);
}
#recordingsList .rec-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 10px; border-bottom: 1px solid #eee;
  cursor: pointer; border-radius: 4px;
  transition: background 0.12s;
}
#recordingsList .rec-entry:hover { background: #f5f5f5; }
#recordingsList .rec-entry:last-child { border-bottom: none; }
#recordingsList .rec-entry .rec-play  { color: #bbb; font-size: 11px; flex-shrink: 0; }
#recordingsList .rec-entry .rec-name  { font-weight: 600; color: #222; flex: 1; }
#recordingsList .rec-entry .rec-meta  { color: #999; font-size: 11px; }
#recordingsList .rec-entry.playing-now { background: #f0f8f0; }
#recordingsList .rec-entry.playing-now .rec-play { color: #00aa00; }

/* ── DECK INFO DISPLAY (yellow on black) ── */
#deckInfo {
  position: absolute;
  pointer-events: none;
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(0,0,0,0.8);
  border-radius: 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; padding: 4px 8px;
  overflow: hidden;
}
.deck-line {
  font-family: 'Courier New', monospace;
  color: #ffcc00;
  text-shadow: 0 0 8px rgba(255,200,0,0.6);
  font-weight: bold; letter-spacing: 1px;
  white-space: nowrap; line-height: 1.3;
  width: 100%; text-align: center;
  overflow: hidden; text-overflow: ellipsis;
}
.deck-line.main { font-size: clamp(7px, 1.15vw, 14px); }
.deck-line.sub  { font-size: clamp(5px, 0.75vw, 9px); color: rgba(255,200,0,0.55); text-shadow: none; }
.deck-line.scroll { animation: dkmarquee 12s linear infinite; }
@keyframes dkmarquee { 0% { transform: translateX(60%); } 100% { transform: translateX(-110%); } }
.deck-line.blink { animation: blink 0.5s step-end infinite; }



/* ── LOGIN / MENU ── */
#menuBtn {
  position: fixed; top: 14px; right: 16px; z-index: 9999;
  width: 52px; height: 58px;
  background: none; border: none; box-shadow: none;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  padding: 0; transition: opacity 0.15s;
  pointer-events: all;
  -webkit-tap-highlight-color: transparent;
}
#menuBtn:hover { opacity: 0.7; }

#menuPanel {
  position: fixed; top: 74px; right: 16px; z-index: 9998;
  background: #fff; border: 1px solid #e8e8e8;
  border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.14);
  width: 280px; padding: 20px;
  display: none; flex-direction: column; gap: 12px;
  font-family: var(--font-optima);
}
#menuPanel.open { display: flex; }

.menu-title {
  font-size: 11px; letter-spacing: 2px; color: #aaa;
  text-transform: uppercase; margin-bottom: 4px; font-family: var(--font-optima);
}
.menu-input {
  width: 100%; padding: 8px 12px; border-radius: 6px;
  border: 1px solid #ddd; font-family: var(--font-optima);
  font-size: 13px; outline: none; color: #333;
  transition: border-color 0.15s;
}
.menu-input:focus { border-color: #aaa; }
.menu-btn {
  width: 100%; padding: 9px; border-radius: 6px;
  background: #111; color: #fff; border: none;
  font-family: var(--font-optima); font-size: 12px;
  letter-spacing: 1px; cursor: pointer;
  transition: background 0.15s;
}
.menu-btn:hover { background: #333; }
.menu-btn.secondary {
  background: transparent; color: #888; border: 1px solid #ddd;
}
.menu-btn.secondary:hover { background: #f5f5f5; }
.menu-btn.danger { background: #c00; }
.menu-btn.danger:hover { background: #a00; }
.menu-err { font-size: 11px; color: #c00; display: none; }
.menu-err.show { display: block; }

#userBadge {
  font-size: 11px; color: #666; text-align: center;
  padding: 4px 0; border-bottom: 1px solid #eee; padding-bottom: 12px;
}
#userBadge strong { color: #222; }

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 600px) {
  .wrapper { width: 100vw; }
  #menuPanel { width: calc(100vw - 32px); right: 8px; top: 58px; }
  #menuBtn { top: 10px; right: 10px; width: 34px; height: 34px; }
  #recordingsWrap { width: 100vw; padding: 0 12px 20px; }
  #recordingsList .rec-entry { flex-direction: column; align-items: flex-start; gap: 2px; }
  #recordingsList .rec-meta { font-size: 10px; }
  .trans-btn { font-size: clamp(10px, 3.5vw, 15px); }
}
@media (max-width: 400px) {
  .knob-label { display: none; }
}



  /* Boombox image fills full width */
  



  /* Show mobile panel */
  #mobilePanel { display: flex; }

  /* Recordings list full width */
  
  #recordingsList .rec-entry { flex-wrap: wrap; }
  #recordingsList .rec-meta { font-size: 11px; width: 100%; padding-left: 22px; }

  #menuBtn { top: 8px; right: 10px; }
  
}


/* Status displays */
#mobilePanel .mob-displays {
  display: flex; gap: 8px;
}
.mob-display {
  flex: 1; background: #0a0a0a; border-radius: 4px;
  padding: 8px 10px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.mob-display.green {
  font-family: 'Courier New', monospace;
  font-size: 12px; font-weight: bold;
  color: #00cc00; letter-spacing: 1px;
  text-shadow: 0 0 5px #009900;
}
.mob-display.yellow {
  font-family: var(--font-optima);
  font-size: 13px; font-weight: 600;
  color: #ffcc00; text-shadow: 0 0 6px rgba(255,200,0,0.5);
  flex: 2;
}

/* Tuner */
#mobileTuner {
  position: relative; height: 28px;
  background: rgba(6,8,20,0.9);
  border: 1px solid rgba(0,0,0,0.5);
  border-radius: 4px; cursor: pointer; overflow: hidden;
}
.mob-tuner-marks {
  position: absolute; inset: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 8px; font-size: 9px;
  color: rgba(160,160,220,0.8);
  font-family: 'Courier New', monospace; pointer-events: none;
}
#mobileTunerNeedle {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: #ff3333; box-shadow: 0 0 4px #ff2222;
  left: 30%; transition: left 0.4s ease; pointer-events: none;
}

/* Transport buttons */
#mobilePanel .mob-transport {
  display: flex; gap: 8px;
}
.mob-btn {
  flex: 1; padding: 16px 0;
  background: linear-gradient(to bottom, #c8c8c8, #888);
  border: 1.5px solid #444; border-radius: 6px;
  font-size: 20px; cursor: pointer; color: #111;
  box-shadow: 0 3px 0 #333, inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 0.07s, box-shadow 0.07s, filter 0.07s;
  -webkit-tap-highlight-color: transparent;
}
.mob-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #333;
  filter: brightness(0.8);
}
.mob-btn.mob-rec-active {
  background: linear-gradient(to bottom, #cc3300, #881100);
  color: #fff; border-color: #660000;
  box-shadow: 0 3px 0 #440000, inset 0 1px 0 rgba(255,120,80,0.3);
}

/* Knobs row */
#mobilePanel .mob-knobs {
  display: flex; justify-content: space-around; align-items: flex-end;
}
.mob-knob-group {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: grab;
}
.mob-knob-group:active { cursor: grabbing; }
.mob-knob {
  width: 54px; height: 54px; border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, #888 0%, #555 30%, #222 65%, #0a0a0a 100%);
  border: 2px solid #111; position: relative;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.7), inset 0 2px 3px rgba(255,255,255,0.2);
  -webkit-tap-highlight-color: transparent;
}
.mob-knob-dot {
  position: absolute; left: 50%; top: 10%;
  width: 3px; height: 30%;
  background: linear-gradient(to bottom, #fff, #bbb);
  border-radius: 2px; transform: translateX(-50%);
  transform-origin: bottom center;
}
.mob-knob-label {
  font-family: var(--font-optima);
  font-size: 11px; color: #555;
  letter-spacing: 1px; text-transform: uppercase; font-weight: 600;
}

/* Volume slider */
#mobilePanel .mob-vol {
  display: flex; align-items: center; gap: 12px;
}
.mob-vol-label {
  font-family: var(--font-optima);
  font-size: 11px; color: #888;
  letter-spacing: 1px; text-transform: uppercase; width: 32px;
}
#mobileVolSlider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; background: linear-gradient(90deg, #333, #777);
  border-radius: 2px; outline: none;
}
#mobileVolSlider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 28px; border-radius: 3px;
  background: linear-gradient(to bottom, #d8d8d8 0%, #888 50%, #555 100%);
  border: 1.5px solid #222;
  box-shadow: 1px 2px 4px rgba(0,0,0,0.6);
  cursor: grab;
}

/* ════════════════════════════════════════
   PORTRAIT MOBILE  (≤ 700px)
   ════════════════════════════════════════ */

/* Default: portrait wrapper hidden */
#portraitWrapper {
  display: none;
  position: relative;
  width: 100%;
}
#portraitWrapper img.portrait-bg {
  width: 100%; display: block; pointer-events: none;
}

@media (max-width: 700px) {

  html, body {
    justify-content: flex-start;
    padding: 48px 0 32px;
    background: #ffffff;
  }

  /* Hide landscape boombox */
  .wrapper { display: none; }
  /* Hide overlaid controls on mobile — use portrait layout instead */
  .overlay .trans-btn,
  .overlay .knob-wrap,
  .overlay .vol-slider-wrap,
  .overlay #eqDisp,
  .overlay #stationDisp,
  .overlay #tuner,
  .overlay #deckInfo { opacity: 0 !important; pointer-events: none !important; }


  /* Show portrait wrapper */
  #portraitWrapper { display: block; }

  #menuBtn { top: 8px; right: 10px; }
  #menuPanel { right: 8px; top: 54px; width: calc(100vw - 16px); }
  #recordingsWrap { width: 100vw; padding: 0 16px 24px; }
  #recordingsList .rec-entry { flex-wrap: wrap; }
  #recordingsList .rec-meta { font-size: 11px; width: 100%; padding-left: 22px; }
}

/* Volume slider */
.port-vol {
  left:1.58%; top:19.77%;
  width:96.32%; height:10.74%;
  display: flex; align-items: center; padding: 0 8px; gap: 8px;
}
.port-vol-label {
  font-family: Optima, Candara, sans-serif;

  letter-spacing: 1px; text-transform: uppercase; font-weight: 600;

}

  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; background: linear-gradient(90deg, #555, #999);
  border-radius: 2px; outline: none;
}
#portVolSlider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 22px; border-radius: 3px;
  background: linear-gradient(to bottom, #d8d8d8 0%, #888 50%, #555 100%);
  border: 1.5px solid #333;

// ── STATE ──
let isPlaying=false, vuInt=null;
let stationPool=[], poolIndex=0, currentStation=null;
let recordings=[], playToken=0, currentUser=null;
const audio = document.getElementById('radioAudio');
audio.volume = 0.7;

// ── NORMALIZER ──
const stationGains = {};
let baseVolume = 0.7;
let gainSaveTimer = null;
function normalizerOnPlay(station) {
  const preferred = stationGains[station.url_resolved];
  const vol = preferred !== undefined ? preferred : baseVolume;
  if (audioChainReady && gainNode) {
    gainNode.gain.value = vol;
    audio.volume = 1;
  } else {
    audio.volume = vol;
  }
  const s = document.getElementById('volSlider'); if(s) s.value = Math.round(vol*100);
  const ps = document.getElementById('portVolSlider'); if(ps) ps.value = Math.round(vol*100);
}
function normalizerOnVolumeChange(val) {
  baseVolume = val/100;
  clearTimeout(gainSaveTimer);
  gainSaveTimer = setTimeout(() => {
    if (currentStation) stationGains[currentStation.url_resolved] = baseVolume;
  }, 1500);
}


// ── WEB AUDIO API ──
let audioCtx = null, mediaSource = null;
let gainNode = null, bassFilter = null, midFilter = null, trebFilter = null;
let pannerNode = null, analyserNode = null;
let audioChainReady = false, useRealEQ = false;

function initAudioChain() {
  if (audioChainReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    mediaSource  = audioCtx.createMediaElementSource(audio);
    gainNode     = audioCtx.createGain();
    bassFilter   = audioCtx.createBiquadFilter();
    midFilter    = audioCtx.createBiquadFilter();
    trebFilter   = audioCtx.createBiquadFilter();
    pannerNode   = audioCtx.createStereoPanner();
    analyserNode = audioCtx.createAnalyser();

    bassFilter.type = 'lowshelf';  bassFilter.frequency.value = 120;  bassFilter.gain.value = 0;
    midFilter.type  = 'peaking';   midFilter.frequency.value  = 1000; midFilter.Q.value = 0.8; midFilter.gain.value = 0;
    trebFilter.type = 'highshelf'; trebFilter.frequency.value = 4000; trebFilter.gain.value = 0;
    pannerNode.pan.value = 0;
    analyserNode.fftSize = 64;
    analyserNode.smoothingTimeConstant = 0.75;

    mediaSource.connect(gainNode).connect(bassFilter).connect(midFilter)
      .connect(trebFilter).connect(pannerNode).connect(analyserNode).connect(audioCtx.destination);

    audioChainReady = true;
    console.log('Web Audio chain ready');
  } catch(e) {
    console.warn('Web Audio API failed, falling back:', e.message);
    audioChainReady = false;
  }
}

function resumeAudioCtx() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function applyKnobToAudio(knobId, angleDeg) {
  if (!audioChainReady) return;
  const norm = angleDeg / 150;
  switch(knobId) {
    case 'kBass': bassFilter.gain.value = norm * 12; break;
    case 'kMid':  midFilter.gain.value  = norm * 10; break;
    case 'kTreb': trebFilter.gain.value = norm * 12; break;
    case 'kBal':  pannerNode.pan.value  = norm;      break;
  }
}

// ── EQ ──
const eqState = Array.from({length:14}, () => 10 + Math.random()*60);
const eqVel   = Array.from({length:14}, () => (Math.random()-0.5)*8);
function animEQ() {
  // Use real frequency data if Web Audio chain is active
  if (useRealEQ && analyserNode && isPlaying) {
    const dataArr = new Uint8Array(analyserNode.frequencyBinCount);
    analyserNode.getByteFrequencyData(dataArr);
    const bars = document.querySelectorAll('.eq-bar');
    const step = Math.max(1, Math.floor(dataArr.length / bars.length));
    bars.forEach((b, i) => {
      const val = dataArr[Math.min(i * step, dataArr.length-1)] || 0;
      b.style.height = Math.max(3, (val / 255) * 96) + '%';
    });
    return;
  }
  // Physics simulation fallback
  document.querySelectorAll('.eq-bar').forEach((b,i) => {
    if (isPlaying) {
      const target = 8 + Math.random()*85*(1-Math.abs(i-6)*0.04);
      eqVel[i] = eqVel[i]*0.6 + (target-eqState[i])*0.3;
      eqState[i] = Math.max(4, Math.min(98, eqState[i]+eqVel[i]));
    } else {
      eqState[i] = Math.max(2, eqState[i]*0.85);
    }
    b.style.height = eqState[i]+'%';
  });
}
function startVU() { if (!vuInt) vuInt = setInterval(animEQ,100); }
function stopVU()  { clearInterval(vuInt); vuInt=null; document.querySelectorAll('.eq-bar').forEach(b=>b.style.height='3%'); }

// ── DISPLAYS ──
function setStation(text, mode) {
  const el = document.getElementById('stationText');
  if (!el) return;
  el.textContent = text;
  el.className = 'station-text'+(mode==='scroll'?' scroll':mode==='blink'?' blink':'');
  const pg = document.getElementById('portSystem');
  if (pg) { pg.textContent=text; pg.className='port-system-text'+(mode==='blink'?' blink':''); }
}
function showDeck(name, country) {
  const m=document.getElementById('deckMain'), s=document.getElementById('deckSub');
  if(m) { m.textContent=name||''; m.className='deck-line main'+((name||'').length>18?' scroll':''); }
  if(s) s.textContent=country||'';
  const py=document.getElementById('portStation');
  if(py) { py.textContent=name||'— — —'; py.className='port-station-text'+((name||'').length>16?' scroll':''); }
}
function setNeedle(pct) {
  const n=document.getElementById('tunerNeedle'); if(n) n.style.left=pct+'%';
  const pn=document.getElementById('portTunerNeedle'); if(pn) pn.style.left=pct+'%';
}
function randomNeedle() { return 6+Math.random()*86; }
function onVolChange(val) {
  const v = val/100;
  if (audioChainReady && gainNode) {
    gainNode.gain.value = v;
    audio.volume = 1; // let gainNode handle volume
  } else {
    audio.volume = v;
  }
  normalizerOnVolumeChange(val);
  setStation('VOL '+val+'%','');
}

// ── FLAG ──
function countryFlag(code) {
  if(!code||code.length!==2) return '';
  try { return String.fromCodePoint(...[...code.toUpperCase()].map(c=>0x1F1E0+c.charCodeAt(0)-65)); }
  catch { return ''; }
}


// ── MEDIA SESSION API (lock screen controls) ──
function updateMediaSession(station) {
  if (!('mediaSession' in navigator)) return;

  const flag = countryFlag(station.countrycode);
  const title  = station.name || 'Unknown Station';
  const artist = (flag ? flag + ' ' : '') + (station.country || 'World Radio');
  const album  = station.tags ? station.tags.split(',')[0].trim() : 'Radios';

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  title,
    artist: artist,
    album:  album,
    artwork: [
      { src: 'https://lscgawukfmnenxyfagaj.supabase.co/storage/v1/object/public/assets/cassette_icon.png', sizes: '512x512', type: 'image/png' }
    ]
  });

  navigator.mediaSession.setActionHandler('play', () => {
    audio.play();
    navigator.mediaSession.playbackState = 'playing';
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    audio.pause();
    isPlaying = false;
    stopVU();
    setStation('PAUSED', '');
    navigator.mediaSession.playbackState = 'paused';
  });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    poolIndex = Math.max(0, poolIndex - 2);
    playRandomStation();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    playRandomStation();
  });
  navigator.mediaSession.setActionHandler('stop', () => {
    audio.pause();
    isPlaying = false;
    stopVU();
    setStation('STOPPED', '');
  });

  navigator.mediaSession.playbackState = 'playing';
}

// ── RADIO API ──
const API_HOSTS=['https://de1.api.radio-browser.info','https://nl1.api.radio-browser.info','https://at1.api.radio-browser.info'];
let apiHost=API_HOSTS[0];

async function fetchStations(attempt=0) {
  if(attempt>=API_HOSTS.length*2) return false;
  try {
    const res=await fetch(`${apiHost}/json/stations/search?limit=80&hidebroken=true&codec=MP3&order=random`,{signal:AbortSignal.timeout(6000)});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const stations=await res.json();
    const fresh=stations.filter(s=>s.url_resolved&&s.url_resolved.startsWith('http')&&s.bitrate>=32);
    if(fresh.length===0) throw new Error('empty');
    stationPool=[...stationPool,...fresh].slice(-200);
    return true;
  } catch(e) {
    const idx=API_HOSTS.indexOf(apiHost);
    apiHost=API_HOSTS[(idx+1)%API_HOSTS.length];
    return fetchStations(attempt+1);
  }
}

async function playRandomStation() {
  const token=++playToken;
  audio.pause(); audio.src=''; isPlaying=false;
  clearTimeout(audio._stallTimer);
  document.getElementById('wrapper').classList.remove('playing');
  document.getElementById('btnPlay').classList.remove('pressed');
  stopVU();
  if(stationPool.length-poolIndex<5) {
    setStation('SCANNING...','blink');
    const ok=await fetchStations();
    if(!ok||token!==playToken) return;
    if(stationPool.length===0) { setStation('NO SIGNAL','blink'); return; }
  }
  const station=stationPool[poolIndex%stationPool.length];
  poolIndex++; currentStation=station;
  setNeedle(randomNeedle()); setStation('TUNING...','blink');
  const skipTimer=setTimeout(()=>{ if(token===playToken&&!isPlaying) { setStation('SKIP...','blink'); playRandomStation(); } },8000);
  audio.src=station.url_resolved;
  audio.volume=document.getElementById('volSlider').value/100;
  try {
    // Init Web Audio on first user gesture
    initAudioChain();
    resumeAudioCtx();
    await audio.play();
    if(token!==playToken) return;
    useRealEQ = audioChainReady;
    clearTimeout(skipTimer);
    isPlaying=true;
    document.getElementById('wrapper').classList.add('playing');
    document.getElementById('btnPlay').classList.add('pressed');
    startVU();
    const flag=countryFlag(station.countrycode);
    const sName=station.name||'UNKNOWN';
    showDeck(sName,(flag?flag+' ':'')+( station.country||''));
    setStation('ON AIR','');
    normalizerOnPlay(station);
    updateMediaSession(station);
    updateMediaSession(station);
  
    clearTimeout(audio._stallTimer);
    audio._stallTimer=setTimeout(()=>{ if(token===playToken&&isPlaying) { setStation('SKIP...','blink'); playRandomStation(); } },6000);
  } catch(e) {
    clearTimeout(skipTimer);
    if(token!==playToken) return;
    stationPool.splice((poolIndex-1)%stationPool.length,1);
    poolIndex=Math.max(0,poolIndex-1);
    setTimeout(playRandomStation,200);
  }
}

// ── AUDIO EVENTS ──
audio.addEventListener('error',()=>{ clearTimeout(audio._stallTimer); if(playToken>0) { setStation('SKIP...','blink'); setTimeout(playRandomStation,300); } });
audio.addEventListener('stalled',()=>{ clearTimeout(audio._stallTimer); if(isPlaying) { setStation('BUFFERING','blink'); audio._stallTimer=setTimeout(()=>{ if(isPlaying) { setStation('SKIP...','blink'); playRandomStation(); } },6000); } });
audio.addEventListener('playing',()=>{ clearTimeout(audio._stallTimer); if(currentStation) { isPlaying=true; document.getElementById('wrapper').classList.add('playing'); startVU(); const flag=countryFlag(currentStation.countrycode); showDeck(currentStation.name||'UNKNOWN',(flag?flag+' ':'')+( currentStation.country||'')); setStation('ON AIR',''); updateMediaSession(currentStation); } });
audio.addEventListener('timeupdate',()=>clearTimeout(audio._stallTimer));

function updateMediaSession(station) {
  if (!('mediaSession' in navigator)) return;
  const flag  = countryFlag(station.countrycode || '');
  const title  = station.name || 'Unknown Station';
  const artist = (flag ? flag + ' ' : '') + (station.country || 'World Radio');

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  title,
    artist: artist,
    album:  'Radios',
    artwork: [
      { src: CASSETTE_ART, sizes: '512x512', type: 'image/png' }
    ]
  });

  navigator.mediaSession.playbackState = 'playing';

  navigator.mediaSession.setActionHandler('play', () => playRandomStation());
  navigator.mediaSession.setActionHandler('pause', () => {
    audio.pause();
    isPlaying = false;
    navigator.mediaSession.playbackState = 'paused';
    document.getElementById('wrapper').classList.remove('playing');
    document.getElementById('btnPlay').classList.remove('pressed');
    stopVU();
    setStation('PAUSED', '');
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => playRandomStation());
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    poolIndex = Math.max(0, poolIndex - 2);
    playRandomStation();
  });
  navigator.mediaSession.setActionHandler('stop', () => {
    audio.pause();
    isPlaying = false;
    navigator.mediaSession.playbackState = 'none';
    setStation('STOPPED', '');
    stopVU();
  });
}

function clearMediaSession() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  'Radios',
    artist: 'World Radio',
    album:  'Radios',
    artwork: [{ src: CASSETTE_ART, sizes: '512x512', type: 'image/png' }]
  });
  navigator.mediaSession.playbackState = 'none';
}

let trashMode = false;

function toggleTrash() {
  trashMode = !trashMode;
  document.body.classList.toggle('trash-mode', trashMode);
  document.getElementById('trashBtn').classList.toggle('active', trashMode);
}

async function deleteRecording(e, idx) {
  e.stopPropagation(); // don't trigger tuneToRecorded
  const r = recordings[idx];
  // Remove from Supabase
  const {data:{user}} = await _sb.auth.getUser();
  if (user) {
    await _sb.from('saved_stations')
      .delete()
      .eq('user_id', user.id)
      .eq('station_url', r.url);
  }
  // Remove from local array
  recordings.splice(idx, 1);
  renderRecordings();
  // Hide wrap if list is now empty
  if (recordings.length === 0) {
    document.getElementById('recordingsWrap').style.display = 'none';
    trashMode = false;
    document.body.classList.remove('trash-mode');
    document.getElementById('trashBtn').classList.remove('active');
  }
}

// ── KNOBS ──
function setupKnob(el) {
  let drag=false,sy=0,sa=0;
  const ring=el.querySelector('.knob-ring');
  const start=e=>{ drag=true; sy=e.touches?e.touches[0].clientY:e.clientY; sa=parseFloat(el.dataset.angle||0); e.preventDefault(); };
  el.addEventListener('mousedown',start);
  el.addEventListener('touchstart',start,{passive:false});
  const move=e=>{ if(!drag) return; const cy=e.touches?e.touches[0].clientY:e.clientY; const a=Math.max(-150,Math.min(150,sa+(sy-cy)*2)); el.dataset.angle=a; ring.style.transform='rotate('+a+'deg)'; applyKnobToAudio(el.id,a); };
  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move,{passive:true});
  const up=()=>{ if(!drag) return; drag=false; const pct=Math.round(((parseFloat(el.dataset.angle||0)+150)/300)*100); setStation((el.title||'KNOB')+': '+pct+'%',''); };
  document.addEventListener('mouseup',up);
  document.addEventListener('touchend',up);
}
document.querySelectorAll('.knob-wrap').forEach(setupKnob);

// ── RECORDINGS ──
function logRecording(station) {
  if(recordings.find(r=>r.url===station.url_resolved)) return;
  const flag=countryFlag(station.countrycode);
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const rec={url:station.url_resolved,name:station.name||'Unknown',country:station.country||'—',genre:station.tags?station.tags.split(',')[0].trim():'—',flag:flag||'📻',time:now,station:station};
  recordings.push(rec);
  renderRecordings();
  saveOneRecording(rec);
}
function renderRecordings() {
  const wrap=document.getElementById('recordingsWrap'),list=document.getElementById('recordingsList');
  if(!wrap||!list) return;
  wrap.style.display='block';
  list.innerHTML=recordings.map((r,i)=>`
    <div class="rec-entry" onclick="tuneToRecorded(${i})">
      <span class="rec-play">▶</span>
      <span class="rec-name">${r.flag} ${r.name}</span>
      <span class="rec-meta">${r.country} · ${r.genre} · ${r.time}</span>
      <button class="rec-delete" onclick="deleteRecording(event,${i})">✕</button>
    </div>`).join('');
}
function tuneToRecorded(idx) {
  const r=recordings[idx];
  document.querySelectorAll('.rec-entry').forEach((el,i)=>el.classList.toggle('playing-now',i===idx));
  audio.pause(); audio.src=''; isPlaying=false; stopVU();
  currentStation=r.station; setNeedle(randomNeedle()); setStation('TUNING...','blink'); showDeck(r.name,r.flag+' '+r.country);
  audio.src=r.url; audio.volume=document.getElementById('volSlider').value/100;
  audio.play().then(()=>{ isPlaying=true; document.getElementById('wrapper').classList.add('playing'); document.getElementById('btnPlay').classList.add('pressed'); startVU(); setStation('ON AIR',''); }).catch(()=>setStation('ERROR','blink'));
}

  const rv=document.getElementById('registerView'); if(rv) rv.style.display='flex';
  const lv=document.getElementById('loginView'); if(lv) lv.style.display='none';
  const re=document.getElementById('regErr'); if(re) re.classList.remove('show');
}

async function doLogin() {
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  if(!u||!p) return;
  const {error}=await _sb.auth.signInWithPassword({email:_email(u),password:p});
  if(error) { document.getElementById('loginErr').classList.add('show'); return; }
  await onLogin(u);
}
async function doRegister() {
  const u=document.getElementById('regUser').value.trim().toLowerCase();
  const p=document.getElementById('regPass').value;
  if(!u||!p) return;
  const {error}=await _sb.auth.signUp({email:_email(u),password:p});
  if(error) { const re=document.getElementById('regErr'); re.textContent=error.message; re.classList.add('show'); return; }
  await onLogin(u);
}
async function doLogout() {
  await _sb.auth.signOut();
  currentUser=null; recordings=[];
  const rw=document.getElementById('recordingsWrap'); if(rw) rw.style.display='none';
  const rl=document.getElementById('recordingsList'); if(rl) rl.innerHTML='';
  showLogin();
}
async function onLogin(username) {
  currentUser=username;
  const ul=document.getElementById('userLabel'); if(ul) ul.textContent=username;
  const lv=document.getElementById('loginView'); if(lv) lv.style.display='none';
  const rv=document.getElementById('registerView'); if(rv) rv.style.display='none';
  const gv=document.getElementById('loggedView'); if(gv) gv.style.display='flex';
  const mp=document.getElementById('menuPanel'); if(mp) mp.classList.remove('open');
  await loadUserRecordings();
}
async function loadUserRecordings() {
  const {data:{user}}=await _sb.auth.getUser();
  if(!user) { console.warn('loadUserRecordings: no user'); return; }
  console.log('Loading recordings for', user.id);
  const {data,error}=await _sb.from('saved_stations').select('*').eq('user_id',user.id).order('saved_at',{ascending:false});
  if(error) { console.error('Load failed:', error.message, error.code, error.hint); return; }
  console.log('Loaded', data?.length, 'recordings');
  if(!data||data.length===0) return;
  recordings=data.map(r=>({url:r.station_url,name:r.station_name,country:r.country,genre:r.genre,flag:r.flag,time:new Date(r.saved_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),station:{url_resolved:r.station_url,name:r.station_name,country:r.country,tags:r.genre,countrycode:''}}));
  renderRecordings();
}
async function saveOneRecording(r) {
  const {data:{user}}=await _sb.auth.getUser();
  if(!user) { console.warn('saveOneRecording: not logged in'); return; }
  const {data:existing}=await _sb.from('saved_stations').select('id').eq('user_id',user.id).eq('station_url',r.url).limit(1);
  if(existing&&existing.length>0) { console.log('Already saved:', r.name); return; }
  const {error}=await _sb.from('saved_stations').insert({user_id:user.id,station_url:r.url,station_name:r.name,country:r.country,genre:r.genre,flag:r.flag});
  if(error) console.error('Save failed:',error.message,error.code,error.hint);
  else console.log('Saved:', r.name);
}

  <img class="portrait-bg" id="portraitBg" alt="Boombox Portrait">

  <!-- Station name (yellow) -->
  <div class="port-ctrl port-station">
    <span class="port-station-text" id="portStation">— — —</span>
  </div>

  <!-- System display (green) -->
  <div class="port-ctrl port-system">
    <span class="port-system-text blink" id="portSystem">PRESS ▶</span>
  </div>

  <!-- Tuner -->
  <div class="port-ctrl port-tuner" id="portTuner">
    <div class="port-tuner-marks">
      <span>88</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span>
    </div>
    <div id="portTunerNeedle"></div>
  </div>

  <!-- Volume -->
  <div class="port-ctrl port-vol">
    <span class="port-vol-label">VOL</span>
    <input type="range" id="portVolSlider" min="0" max="100" value="70">
  </div>

  <!-- Transport buttons -->
  <button class="port-btn" id="portBtnRew"  style="left:2.0%;top:78.97%;width:18.8%;height:8.0%;">⏮</button>
  <button class="port-btn" id="portBtnPlay" style="left:21.3%;top:78.97%;width:18.8%;height:8.0%;">▶</button>
  <button class="port-btn" id="portBtnStop" style="left:40.6%;top:78.97%;width:18.8%;height:8.0%;">■</button>
  <button class="port-btn" id="portBtnFF"   style="left:59.9%;top:78.97%;width:18.8%;height:8.0%;">⏭</button>
  <button class="port-btn" id="portBtnRec"  style="left:79.2%;top:78.97%;width:18.8%;height:8.0%;">●</button>

</div>

    <div class="menu-title">Create account</div>
    <input class="menu-input" id="regUser" type="text" placeholder="Choose a username">
    <input class="menu-input" id="regPass" type="password" placeholder="Choose a password">
    <div class="menu-err" id="regErr">Username already taken</div>
    <button class="menu-btn" onclick="doRegister()">Create account</button>
    <button class="menu-btn secondary" onclick="showLogin()">Back to sign in</button>
  </div>
  <div id="loggedView" style="display:none;flex-direction:column;gap:12px;">
    <div id="userBadge">Signed in as <strong id="userLabel"></strong></div>
    <button class="menu-btn secondary" onclick="doLogout()">Sign out</button>
  </div>
</div>

<div id="recordingsWrap">
  <h3><span>● Recorded Stations</span><button id="trashBtn" onclick="toggleTrash()" title="Delete stations">🗑</button></h3>
  <div id="recordingsList"></div>
</div>

</body>
</html>
